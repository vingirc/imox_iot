; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = T-Display-AMOLED
boards_dir = boards

[env]
; lib_extra_dirs = ${PROJECT_DIR} 
lib_ignore = lib_deps
extra_scripts = pre:patch_lv_conf.py
platform = espressif32@6.12.0
framework = arduino
upload_speed =  921600
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -DLV_FONT_FMT_TXT_LARGE=1

    ; Enable -DARDUINO_USB_CDC_ON_BOOT will start printing and wait for terminal access during startup
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; USB host example must disable usb cdc
    ; Enable -UARDUINO_USB_CDC_ON_BOOT will turn off printing and will not block when using the battery
    ; -UARDUINO_USB_CDC_ON_BOOT
    -DCORE_DEBUG_LEVEL=1

monitor_filters =
	default
	esp32_exception_decoder

lib_deps = 
    https://github.com/Xinyuan-LilyGO/LilyGo-AMOLED-Series.git

    ; === LIBRERÍAS NECESARIAS PARA IMOX ===
    bblanchon/ArduinoJson @ ^7.0.0          ; Para JSON (BLE provisioning, MQTT payloads)
    https://github.com/mandulaj/PZEM-004T-v30.git ; Sensor PZEM-004T v3.0
    h2zero/NimBLE-Arduino @ ^1.4.0          ; BLE Server para provisioning (ligero, compatible ESP32-S3)
    ; NOTA: lvgl ya está incluido en LilyGo-AMOLED-Series, NO agregar otra versión

[env:T-Display-AMOLED]
extends = env
board = T-Display-AMOLED
build_flags =
    ${env.build_flags}
